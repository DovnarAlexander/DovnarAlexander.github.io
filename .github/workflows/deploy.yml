---
name: Deploy site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Render site (index.html + blog/<slug>/)
        env:
          CI: "true"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: task render

      - name: Stage publishable files
        run: |
          mkdir -p _site
          cp -r index.html css js fonts uploads favicon.ico CNAME _site/
          [ -d blog ] && cp -r blog _site/ || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
