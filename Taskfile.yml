version: '3'

vars:
  PYTHON: uv run python
  YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
  CONTAINER_NAME: personal-github-page
  CV_IMAGE: dovnar-cv-builder
  PORT: 8080
  TAILWIND_VERSION: v4.1.11
  TAILWIND_BIN: bin/tailwindcss

silent: true

tasks:
  sync:
    desc: Sync Python deps with uv
    cmds:
      - uv sync --frozen || uv sync

  install-tailwind:
    desc: Download the pinned Tailwind standalone CLI binary (no Node required)
    status:
      - test -x {{.TAILWIND_BIN}}
    cmds:
      - mkdir -p bin
      - |
        case "$(uname -s)-$(uname -m)" in
          Darwin-arm64)  ASSET=tailwindcss-macos-arm64 ;;
          Darwin-x86_64) ASSET=tailwindcss-macos-x64 ;;
          Linux-x86_64)  ASSET=tailwindcss-linux-x64 ;;
          Linux-aarch64) ASSET=tailwindcss-linux-arm64 ;;
          *) echo "Unsupported platform: $(uname -s)-$(uname -m)"; exit 1 ;;
        esac
        echo "Downloading Tailwind {{.TAILWIND_VERSION}} ($ASSET)..."
        curl -fsSL -o {{.TAILWIND_BIN}} \
          "https://github.com/tailwindlabs/tailwindcss/releases/download/{{.TAILWIND_VERSION}}/$ASSET"
        chmod +x {{.TAILWIND_BIN}}

  build-css:
    desc: Build Tailwind CSS to css/tailwind.css (minifies when CI is set)
    deps: [install-tailwind]
    cmds:
      - "{{.TAILWIND_BIN}} -i css/input.css -o css/tailwind.css {{if .CI}}--minify{{end}}"

  render:
    desc: Render site to index.html (respects CI for minification)
    cmds:
      - task: sync
      - task: build-css
      - >
        {{.PYTHON}} ./generate.py
    env:
      YOUTUBE_API_KEY: "{{.YOUTUBE_API_KEY}}"

  build:
    desc: Build static site (alias to render)
    cmds:
      - task: render

  build-cv:
    desc: Build CV PDFs (EN + RU) from cv/ sources via WeasyPrint (Dockerized — no host deps)
    cmds:
      - docker build -q -t {{.CV_IMAGE}} -f cv/Dockerfile cv >/dev/null
      - docker run --rm --volume "$PWD:/work" {{.CV_IMAGE}}
      - echo "CV PDFs written to uploads/"

  clean:
    desc: Remove generated artifacts
    cmds:
      - rm -f index.html

  serve:
    desc: Run site locally in Docker container (http://localhost:{{.PORT}})
    cmds:
      - task: render
      - docker stop {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker rm {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker run --rm -d --name {{.CONTAINER_NAME}} --volume ".:/usr/local/apache2/htdocs:ro" -p {{.PORT}}:80 httpd:latest
      - echo "Server running at http://localhost:{{.PORT}}"

  serve-only:
    desc: Run site locally without re-rendering (http://localhost:{{.PORT}})
    cmds:
      - docker stop {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker rm {{.CONTAINER_NAME}} 2>/dev/null || true
      - docker run --rm -d --name {{.CONTAINER_NAME}} --volume ".:/usr/local/apache2/htdocs:ro" -p {{.PORT}}:80 httpd:latest
      - echo "Server running at http://localhost:{{.PORT}}"

  stop:
    desc: Stop the local Docker container
    cmds:
      - docker stop {{.CONTAINER_NAME}} 2>/dev/null || true
